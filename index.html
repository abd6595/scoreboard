            <button class="but2" onclick="incrementt()">+2</button>

        </div>
        <div class="deat">
            <span class="hg">GUEST</span>
            <br>
            <span class="bach" id="five">05</span>
            <br>

            <button class="but2" onclick="incrementtn()">+2</button>
            <button class="but3" onclick="incrementtrn()">+3</button>
